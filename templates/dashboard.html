<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Digital Wallet</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="container header-content">
            <a href="/dashboard" class="logo">
                <div class="logo-icon">DW</div>
                <span>Digital Wallet</span>
            </a>
            <nav class="nav">
                <div class="user-menu">
                    <div class="user-avatar" id="userAvatar">U</div>
                    <span id="userEmail">user@example.com</span>
                    <button class="btn btn-secondary btn-sm" onclick="logout()">Logout</button>
                </div>
            </nav>
        </div>
    </header>

    <main class="dashboard">
        <div class="container">
            <div class="dashboard-header">
                <div>
                    <h1 class="dashboard-title">Dashboard</h1>
                    <p class="dashboard-subtitle">Manage your posts and transactions</p>
                </div>
                <button class="btn btn-primary" onclick="openCreateModal()">
                    <span>+ New Post</span>
                </button>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">Total Posts</div>
                    <div class="stat-value" id="totalPosts">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Published</div>
                    <div class="stat-value" id="publishedPosts">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Drafts</div>
                    <div class="stat-value" id="draftPosts">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Avg Rating</div>
                    <div class="stat-value" id="avgRating">-</div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">All Posts</h2>
                    <input type="text" class="form-input" placeholder="Search posts..." id="searchInput" style="width: 250px;" oninput="filterPosts()">
                </div>
                <div class="card-body">
                    <div id="postsContainer" class="posts-grid">
                        <div class="loading">
                            <div class="spinner"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Create/Edit Post Modal -->
    <div class="modal-overlay" id="postModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">Create New Post</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <form id="postForm">
                <div class="modal-body">
                    <input type="hidden" id="postId">
                    <div class="form-group">
                        <label class="form-label" for="postTitle">Title</label>
                        <input type="text" id="postTitle" class="form-input" placeholder="Enter post title" required maxlength="500">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="postContent">Content</label>
                        <textarea id="postContent" class="form-input" placeholder="Enter post content" rows="5" required maxlength="500"></textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="postRating">Rating (Optional)</label>
                        <input type="number" id="postRating" class="form-input" placeholder="0-10" min="0" max="10" step="0.1">
                    </div>
                    <div class="form-group">
                        <label class="form-checkbox">
                            <input type="checkbox" id="postPublished" checked>
                            <span>Published</span>
                        </label>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="submitBtn">Create Post</button>
                </div>
            </form>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="/static/js/app.js"></script>
    <script>
        let allPosts = [];

        // Auth check
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = '/login';
        }

        // Load posts on page load
        document.addEventListener('DOMContentLoaded', loadPosts);

        async function loadPosts() {
            try {
                const response = await fetch('/posts', {
                    headers: {
                        'Authorization': `${localStorage.getItem('tokenType') || 'Bearer'} ${token}`
                    }
                });

                if (response.ok) {
                    allPosts = await response.json();
                    renderPosts(allPosts);
                    updateStats(allPosts);
                } else if (response.status === 401) {
                    localStorage.removeItem('token');
                    window.location.href = '/login';
                } else {
                    showToast('Failed to load posts', 'error');
                }
            } catch (error) {
                showToast('An error occurred while loading posts', 'error');
            }
        }

        function renderPosts(posts) {
            const container = document.getElementById('postsContainer');

            if (posts.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📝</div>
                        <h3 class="empty-state-title">No posts yet</h3>
                        <p class="empty-state-text">Create your first post to get started</p>
                        <button class="btn btn-primary" onclick="openCreateModal()">Create Post</button>
                    </div>
                `;
                return;
            }

            container.innerHTML = posts.map(post => `
                <div class="post-card">
                    <div class="post-header">
                        <h3 class="post-title">${escapeHtml(post.title)}</h3>
                        <span class="post-badge ${post.published ? 'published' : 'draft'}">
                            ${post.published ? 'Published' : 'Draft'}
                        </span>
                    </div>
                    <p class="post-content">${escapeHtml(post.content)}</p>
                    <div class="post-meta">
                        <span class="post-date">${formatDate(post.created_at)}</span>
                        <div style="display: flex; align-items: center; gap: 12px;">
                            ${post.rating !== null ? `
                                <span class="post-rating">★ ${post.rating}</span>
                            ` : ''}
                            <div class="post-actions">
                                <button class="btn btn-secondary btn-sm" onclick="editPost(${post.id})">Edit</button>
                                <button class="btn btn-danger btn-sm" onclick="deletePost(${post.id})">Delete</button>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function updateStats(posts) {
            const total = posts.length;
            const published = posts.filter(p => p.published).length;
            const drafts = total - published;
            const ratings = posts.filter(p => p.rating !== null).map(p => p.rating);
            const avgRating = ratings.length > 0
                ? (ratings.reduce((a, b) => a + b, 0) / ratings.length).toFixed(1)
                : '-';

            document.getElementById('totalPosts').textContent = total;
            document.getElementById('publishedPosts').textContent = published;
            document.getElementById('draftPosts').textContent = drafts;
            document.getElementById('avgRating').textContent = avgRating;
        }

        function filterPosts() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allPosts.filter(post =>
                post.title.toLowerCase().includes(query) ||
                post.content.toLowerCase().includes(query)
            );
            renderPosts(filtered);
        }

        function openCreateModal() {
            document.getElementById('modalTitle').textContent = 'Create New Post';
            document.getElementById('postForm').reset();
            document.getElementById('postId').value = '';
            document.getElementById('submitBtn').textContent = 'Create Post';
            document.getElementById('postModal').classList.add('active');
        }

        async function editPost(id) {
            try {
                const response = await fetch(`/posts/${id}`, {
                    headers: {
                        'Authorization': `${localStorage.getItem('tokenType') || 'Bearer'} ${token}`
                    }
                });

                if (response.ok) {
                    const post = await response.json();
                    document.getElementById('modalTitle').textContent = 'Edit Post';
                    document.getElementById('postId').value = post.id;
                    document.getElementById('postTitle').value = post.title;
                    document.getElementById('postContent').value = post.content;
                    document.getElementById('postRating').value = post.rating || '';
                    document.getElementById('postPublished').checked = post.published;
                    document.getElementById('submitBtn').textContent = 'Update Post';
                    document.getElementById('postModal').classList.add('active');
                }
            } catch (error) {
                showToast('Failed to load post', 'error');
            }
        }

        function closeModal() {
            document.getElementById('postModal').classList.remove('active');
        }

        document.getElementById('postForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const postId = document.getElementById('postId').value;
            const postData = {
                title: document.getElementById('postTitle').value,
                content: document.getElementById('postContent').value,
                published: document.getElementById('postPublished').checked,
                rating: document.getElementById('postRating').value ? parseFloat(document.getElementById('postRating').value) : null
            };

            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<div class="spinner"></div>';

            try {
                const url = postId ? `/posts/${postId}` : '/posts';
                const method = postId ? 'PUT' : 'POST';

                const response = await fetch(url, {
                    method,
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `${localStorage.getItem('tokenType') || 'Bearer'} ${token}`
                    },
                    body: JSON.stringify(postData)
                });

                if (response.ok) {
                    showToast(postId ? 'Post updated successfully!' : 'Post created successfully!', 'success');
                    closeModal();
                    loadPosts();
                } else {
                    const error = await response.json();
                    showToast(error.detail || 'Operation failed', 'error');
                }
            } catch (error) {
                showToast('An error occurred', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = postId ? 'Update Post' : 'Create Post';
            }
        });

        async function deletePost(id) {
            if (!confirm('Are you sure you want to delete this post?')) return;

            try {
                const response = await fetch(`/posts/${id}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `${localStorage.getItem('tokenType') || 'Bearer'} ${token}`
                    }
                });

                if (response.ok) {
                    showToast('Post deleted successfully!', 'success');
                    loadPosts();
                } else {
                    showToast('Failed to delete post', 'error');
                }
            } catch (error) {
                showToast('An error occurred', 'error');
            }
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('tokenType');
            window.location.href = '/login';
        }

        // Close modal on overlay click
        document.getElementById('postModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('postModal')) {
                closeModal();
            }
        });
    </script>
</body>
</html>
